version: "3.9"

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: mcp-sales-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salesMCP2024!}
      POSTGRES_DB: ${POSTGRES_DB:-sales_db}
    ports:
      - "5432:5432"
    volumes:
      # Auto-run SQL files on first startup
      - ./db/init:/docker-entrypoint-initdb.d:ro
      # Persist data between restarts
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sales_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mcp-network

  # ============================================
  # MCP Sales Analytics Server
  # ============================================
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-sales-server
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-sales_db}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-salesMCP2024!}
      DB_SCHEMA: sales
      MCP_SERVER_NAME: sales-analytics
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    # stdin_open + tty allow stdio communication
    stdin_open: true
    tty: true
    networks:
      - mcp-network

volumes:
  pgdata:
    driver: local

networks:
  mcp-network:
    name: mcp-sales-network
    driver: bridge